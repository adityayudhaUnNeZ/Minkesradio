<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minkes Radio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Poppins:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body class="min-h-screen app-shell">
    <main class="mx-auto max-w-6xl px-6 pb-12 pt-10">
      <header class="rounded-3xl border border-white/70 bg-white/60 px-6 py-4 shadow-soft">
        <div class="flex flex-wrap items-center justify-between gap-4">
          <div class="flex items-center gap-3">
            <svg width="56" height="56" viewBox="0 0 80 80" aria-hidden="true">
              <defs>
                <linearGradient id="g1" x1="0" x2="1">
                  <stop offset="0" stop-color="#22d3ee" />
                  <stop offset="1" stop-color="#f472b6" />
                </linearGradient>
              </defs>
              <path
                d="M40 8c14 0 26 12 26 26 0 18-26 38-26 38S14 52 14 34C14 20 26 8 40 8z"
                fill="url(#g1)"
              />
              <circle cx="40" cy="36" r="14" fill="white" opacity="0.85" />
              <path d="M28 36h24" stroke="#0ea5a5" stroke-width="4" stroke-linecap="round" />
              <path d="M34 30c2 4 4 6 6 10" stroke="#0ea5a5" stroke-width="4" stroke-linecap="round" />
              <path d="M40 24l4 8h8" stroke="#0ea5a5" stroke-width="4" stroke-linecap="round" />
              <path d="M40 6c8 2 14 8 16 16" stroke="#f472b6" stroke-width="4" stroke-linecap="round" fill="none" />
            </svg>
            <div class="leading-tight">
              <div class="text-2xl font-extrabold brand-title">MINKES</div>
              <div class="-mt-1 text-lg font-extrabold tracking-[0.3em] brand-subtitle">RADIO</div>
            </div>
          </div>

          <nav class="hidden items-center gap-8 text-sm font-semibold text-slate-500 md:flex">
            <a class="text-teal-600" href="#">HOME</a>
            <a href="#">PROGRAM</a>
            <a href="#">CONTACT</a>
          </nav>

          <div class="flex items-center gap-3">
            <a class="flex h-8 w-8 items-center justify-center rounded-lg bg-red-500 text-white shadow" href="#" aria-label="YouTube">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path d="M23 7.5a4 4 0 0 0-2.8-2.8C18.6 4.3 12 4.3 12 4.3s-6.6 0-8.2.4A4 4 0 0 0 1 7.5 41.5 41.5 0 0 0 .6 12a41.5 41.5 0 0 0 .4 4.5 4 4 0 0 0 2.8 2.8c1.6.4 8.2.4 8.2.4s6.6 0 8.2-.4a4 4 0 0 0 2.8-2.8A41.5 41.5 0 0 0 23.4 12 41.5 41.5 0 0 0 23 7.5zM9.8 15.3V8.7l6 3.3-6 3.3z"></path>
              </svg>
            </a>
            <a class="flex h-8 w-8 items-center justify-center rounded-lg bg-gradient-to-tr from-yellow-400 via-pink-500 to-purple-500 text-white shadow" href="#" aria-label="Instagram">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path d="M7 3h10a4 4 0 0 1 4 4v10a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V7a4 4 0 0 1 4-4zm5 5a4 4 0 1 0 0 8 4 4 0 0 0 0-8zm6.5-.8a1.2 1.2 0 1 0 0 2.4 1.2 1.2 0 0 0 0-2.4z"></path>
              </svg>
            </a>
            <a class="flex h-8 w-8 items-center justify-center rounded-lg bg-slate-800 text-white shadow" href="#" aria-label="Twitter">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path d="M21.6 6.1c-.8.4-1.6.6-2.5.8a4.3 4.3 0 0 0 1.9-2.4 8.4 8.4 0 0 1-2.7 1A4.2 4.2 0 0 0 11 9.3a12 12 0 0 1-8.7-4.4 4.2 4.2 0 0 0 1.3 5.6 4 4 0 0 1-1.9-.5v.1a4.2 4.2 0 0 0 3.4 4.1 4.3 4.3 0 0 1-1.9.1 4.2 4.2 0 0 0 3.9 2.9A8.5 8.5 0 0 1 2 18.6a12 12 0 0 0 6.5 1.9c7.8 0 12.1-6.4 12.1-12 0-.2 0-.4 0-.6a8.5 8.5 0 0 0 2-2.2z"></path>
              </svg>
            </a>
          </div>
        </div>
      </header>

      <section class="mt-8 card-glow p-4 md:p-6">
        <div class="grid grid-cols-1 gap-6 lg:grid-cols-[1.2fr_0.8fr]">
          <div class="order-1 rounded-2xl bg-white/80 p-3 shadow-inner">
            <img
              id="poster"
              alt="Poster"
              class="h-[360px] w-full rounded-xl object-cover md:h-[520px]"
              src="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%27720%27%20height%3D%27960%27%3E%3Cdefs%3E%3ClinearGradient%20id%3D%27g%27%20x1%3D%270%27%20x2%3D%271%27%3E%3Cstop%20stop-color%3D%27%238be4df%27%20offset%3D%270%27%2F%3E%3Cstop%20stop-color%3D%27%23f6b2e6%27%20offset%3D%271%27%2F%3E%3C%2FlinearGradient%3E%3C%2Fdefs%3E%3Crect%20fill%3D%27url(%23g)%27%20width%3D%27100%25%27%20height%3D%27100%25%27%2F%3E%3Ctext%20x%3D%2750%25%27%20y%3D%2750%25%27%20dominant-baseline%3D%27middle%27%20text-anchor%3D%27middle%27%20font-family%3D%27Arial%27%20font-size%3D%2748%27%20fill%3D%27%230f172a%27%20opacity%3D%270.55%27%3EPOSTER%3C%2Ftext%3E%3C%2Fsvg%3E"
            />
          </div>

            <div class="order-2 space-y-5">
            <div class="panel">
              <div class="text-xs font-semibold uppercase tracking-[0.2em] text-teal-500">Live Broadcast</div>
              <div class="mt-3 border-t border-slate-200 pt-4">
                <div class="text-lg font-semibold text-slate-700">
                  <span id="listenerCount">60 Listener</span>
                </div>
                <div class="mt-1 text-sm text-slate-500">
                  <span id="topicText">Topics: UHC</span>
                </div>
              </div>

              <div class="mt-5 flex items-center justify-center gap-4">
                <button
                  id="btnMute"
                  class="flex h-12 w-12 items-center justify-center rounded-xl bg-pink-100 text-slate-700 shadow"
                  type="button"
                  aria-label="mute"
                  title="Mute"
                >
                  <svg id="iconVolume" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path
                      d="M4 9h4l5-4v14l-5-4H4V9zm12.5 3a4.5 4.5 0 0 0-2-3.7v7.4a4.5 4.5 0 0 0 2-3.7z"
                    ></path>
                  </svg>
                </button>

                <button
                  id="btnPlay"
                  class="flex h-16 w-16 items-center justify-center rounded-full bg-slate-700 text-white shadow-soft"
                  type="button"
                  aria-label="play pause"
                  title="Play/Pause"
                >
                  <svg id="iconPlay" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5l11 7-11 7V5z"></path>
                  </svg>
                </button>

                <button
                  id="btnShare"
                  class="flex h-12 w-12 items-center justify-center rounded-xl bg-pink-100 text-slate-700 shadow"
                  type="button"
                  aria-label="share"
                  title="Share"
                >
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M18 16a3 3 0 0 0-2.2 1l-7.3-4.2a3.1 3.1 0 0 0 0-1.6l7.3-4.2A3 3 0 1 0 14 5a3 3 0 0 0 .1.7L6.8 10a3 3 0 1 0 0 4l7.3 4.3A3 3 0 1 0 18 16z"></path>
                  </svg>
                </button>
              </div>

              <div class="mt-4">
                <div class="h-1.5 w-full rounded-full bg-slate-200">
                  <div id="seekBar" class="h-1.5 w-2/5 rounded-full bg-slate-500"></div>
                </div>
              </div>

              <div class="mt-3 text-xs text-slate-500">
                <span id="hint">Setel URL stream di halaman Admin untuk mulai memutar.</span>
              </div>
            </div>

            <div class="panel">
              <div class="mb-4 rounded-full bg-pink-100 p-1 text-center text-sm font-semibold text-slate-600">
                <button
                  id="tabSalam"
                  class="tab-pill tab-pill-active"
                  type="button"
                  aria-pressed="true"
                >
                  Titip Salam
                </button>
                <button
                  id="tabRequest"
                  class="ml-2 tab-pill"
                  type="button"
                  aria-pressed="false"
                >
                  Request Lagu
                </button>
              </div>
              <form id="formSalam" class="space-y-3">
                <input class="form-input" placeholder="Nama" />
                <input class="form-input" placeholder="Asal" />
                <input class="form-input" placeholder="Titip Salam" />
                <button class="mt-3 btn-primary">
                  Kirim
                </button>
              </form>

              <form id="formRequest" class="space-y-3 hidden">
                <input class="form-input" placeholder="Nama" />
                <input class="form-input" placeholder="Penyanyi" />
                <input class="form-input" placeholder="Judul Lagu" />
                <button class="mt-3 btn-primary">
                  Kirim
                </button>
              </form>
            </div>
          </div>
        </div>
      </section>

      <p class="mt-6 text-center text-xs text-slate-500">powered by Dinas Kesehatan Kota Semarang</p>
    </main>

    <audio id="audio" preload="none" crossorigin="anonymous"></audio>
    <script src="/assets/app.js"></script>
  </body>
</html>
