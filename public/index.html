<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minkes Radio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Poppins:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles/base.css" />
    <link rel="stylesheet" href="assets/styles/layout.css" />
    <link rel="stylesheet" href="assets/styles/hero.css" />
    <link rel="stylesheet" href="assets/styles/form.css" />
    <link rel="stylesheet" href="assets/styles/responsive.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:wght@400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="page">
    <main class="container">
      <header class="topbar card">
        <img
          src="assets/images/logo-minkes.png"
          alt="Logo Minkes Radio"
          class="brand-logo-only"
        />
        <div class="topbar-socials">
          <a class="social-icon" href="#" aria-label="Instagram">
            <img src="assets/images/icon-instagram.png" alt="Instagram" />
          </a>
          <a class="social-icon" href="#" aria-label="TikTok">
            <img src="assets/images/icon-tiktok.png" alt="TikTok" />
          </a>
          <a class="social-icon" href="#" aria-label="YouTube">
            <img src="assets/images/icon-youtube.png" alt="YouTube" />
          </a>
        </div>
      </header>

      <section class="hero card-glow">
        <div class="hero-grid">
          <div class="poster-wrap card">
            <img
              id="poster"
              alt="Poster"
              class="poster"
              src="assets/images/poster.jpeg"
            />
          </div>

          <div class="side-stack">
            <div class="panel">
              <div id="liveLabel" class="section-label">Live Broadcast</div>
              <div class="section-body">
                <div class="stat">
                  <span id="listenerCount">Memuat...</span>
                </div>
                <div id="listenerUpdated" class="stat-sub">
                  Terakhir update --.-- WIB
                </div>
              </div>

              <div class="controls">
                <button
                  id="btnMute"
                  class="icon-btn"
                  type="button"
                  aria-label="mute"
                  title="Mute"
                >
                  <span
                    id="iconVolume"
                    class="material-symbols-rounded icon-symbol"
                    >volume_up</span
                  >
                </button>

                <button
                  id="btnPlay"
                  class="play-btn"
                  type="button"
                  aria-label="play pause"
                  title="Play/Pause"
                >
                  <span
                    id="iconPlay"
                    class="material-symbols-rounded icon-symbol icon-symbol-lg"
                    >play_arrow</span
                  >
                </button>

                <button
                  id="btnShare"
                  class="icon-btn"
                  type="button"
                  aria-label="share"
                  title="Share"
                >
                  <span
                    id="iconShare"
                    class="material-symbols-rounded icon-symbol"
                    >share</span
                  >
                </button>
              </div>

              <div class="progress">
                <div class="progress-track">
                  <div id="seekBar" class="progress-bar"></div>
                </div>
              </div>

              <div class="hint">
                <span id="hint">Setel URL stream untuk mulai memutar.</span>
              </div>
            </div>

            <div class="panel">
              <div class="tab-bar">
                <button
                  id="tabSalam"
                  class="tab-pill tab-pill-active"
                  type="button"
                  aria-pressed="true"
                >
                  Titip Salam
                </button>
                <button
                  id="tabRequest"
                  class="tab-pill"
                  type="button"
                  aria-pressed="false"
                >
                  Request Lagu
                </button>
              </div>
              <form id="formMain" class="form-stack">
                <input id="fieldName" class="form-input" placeholder="Nama" />
                <input id="fieldSecond" class="form-input" placeholder="Asal" />
                <input
                  id="fieldMessage"
                  class="form-input"
                  placeholder="Titip Salam"
                />
                <button class="btn-primary">Kirim</button>
              </form>
            </div>
          </div>
        </div>
      </section>

      <p class="footer">powered by Dinas Kesehatan Kota Semarang</p>
    </main>

    <audio id="audio" preload="none" crossorigin="anonymous"></audio>
    <script src="assets/app.js"></script>
  </body>
</html>
