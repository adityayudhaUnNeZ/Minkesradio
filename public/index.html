<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minkes Radio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Poppins:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles/base.css" />
    <link rel="stylesheet" href="assets/styles/layout.css" />
    <link rel="stylesheet" href="assets/styles/hero.css" />
    <link rel="stylesheet" href="assets/styles/form.css" />
    <link rel="stylesheet" href="assets/styles/responsive.css" />
  </head>
  <body class="page">
    <main class="container">
      <header class="topbar card">
        <img
          src="assets/images/logo-minkes.png"
          alt="Logo Minkes Radio"
          class="brand-logo-only"
        />
        <div class="topbar-socials">
          <a class="social-icon" href="#" aria-label="Instagram">
            <img src="assets/images/icon-instagram.png" alt="Instagram" />
          </a>
          <a class="social-icon" href="#" aria-label="TikTok">
            <img src="assets/images/icon-tiktok.png" alt="TikTok" />
          </a>
          <a class="social-icon" href="#" aria-label="YouTube">
            <img src="assets/images/icon-youtube.png" alt="YouTube" />
          </a>
        </div>
      </header>

      <section class="hero card-glow">
        <div class="hero-grid">
          <div class="poster-wrap card">
            <img
              id="poster"
              alt="Poster"
              class="poster"
              src="assets/images/poster.png"
            />
          </div>

          <div class="side-stack">
            <div class="panel">
              <div class="section-label">Live Broadcast</div>
              <div class="section-body">
                <div class="stat">
                  <span id="listenerCount">60 Listener</span>
                </div>
                <div class="stat-sub">
                  <span id="topicText">Topics: UHC</span>
                </div>
              </div>

              <div class="controls">
                <button
                  id="btnMute"
                  class="icon-btn"
                  type="button"
                  aria-label="mute"
                  title="Mute"
                >
                  <svg
                    id="iconVolume"
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="currentColor"
                  >
                    <path
                      d="M4 9h4l5-4v14l-5-4H4V9zm12.5 3a4.5 4.5 0 0 0-2-3.7v7.4a4.5 4.5 0 0 0 2-3.7z"
                    ></path>
                  </svg>
                </button>

                <button
                  id="btnPlay"
                  class="play-btn"
                  type="button"
                  aria-label="play pause"
                  title="Play/Pause"
                >
                  <svg
                    id="iconPlay"
                    width="22"
                    height="22"
                    viewBox="0 0 24 24"
                    fill="currentColor"
                  >
                    <path d="M8 5l11 7-11 7V5z"></path>
                  </svg>
                </button>

                <button
                  id="btnShare"
                  class="icon-btn"
                  type="button"
                  aria-label="share"
                  title="Share"
                >
                  <svg
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="currentColor"
                  >
                    <path
                      d="M18 16a3 3 0 0 0-2.2 1l-7.3-4.2a3.1 3.1 0 0 0 0-1.6l7.3-4.2A3 3 0 1 0 14 5a3 3 0 0 0 .1.7L6.8 10a3 3 0 1 0 0 4l7.3 4.3A3 3 0 1 0 18 16z"
                    ></path>
                  </svg>
                </button>
              </div>

              <div class="progress">
                <div class="progress-track">
                  <div id="seekBar" class="progress-bar"></div>
                </div>
              </div>

              <div class="hint">
                <span id="hint">Setel URL stream untuk mulai memutar.</span>
              </div>
            </div>

            <div class="panel">
              <div class="tab-bar">
                <button
                  id="tabSalam"
                  class="tab-pill tab-pill-active"
                  type="button"
                  aria-pressed="true"
                >
                  Titip Salam
                </button>
                <button
                  id="tabRequest"
                  class="tab-pill"
                  type="button"
                  aria-pressed="false"
                >
                  Request Lagu
                </button>
              </div>
              <form id="formMain" class="form-stack">
                <input id="fieldName" class="form-input" placeholder="Nama" />
                <input id="fieldSecond" class="form-input" placeholder="Asal" />
                <input id="fieldMessage" class="form-input" placeholder="Titip Salam" />
                <button class="btn-primary">Kirim</button>
              </form>
            </div>
          </div>
        </div>
      </section>

      <p class="footer">powered by Dinas Kesehatan Kota Semarang</p>
    </main>

    <audio id="audio" preload="none" crossorigin="anonymous"></audio>
    <script src="assets/app.js"></script>
  </body>
</html>
